<!DOCTYPE html>
<html>
<head>
<script src="https://cdnjs.cloudflare.com/ajax/libs/paper.js/0.12.17/paper-full.min.js"></script>
</head>
<body>
<canvas id="myCanvas" width="400" height="400"></canvas>
<script>
  window.onload = function() {
    paper.setup('myCanvas');
    // Draw a circle at 50, 50
    var circle = new paper.Path.Circle(new paper.Point(50, 50), 20);
    circle.fillColor = 'black';
    
    // Zoom in
    paper.view.zoom = 2;
    paper.view.center = new paper.Point(50, 50);

    // Export with view bounds
    var svgView = paper.project.exportSVG({ asString: true });
    
    // Export with 100x100 bounds
    var svgRect = paper.project.exportSVG({ 
      asString: true, 
      bounds: new paper.Rectangle(0, 0, 100, 100) 
    });

    console.log("VIEW:", svgView);
    console.log("RECT:", svgRect);
    
    document.body.innerHTML += "<pre id='out1'>" + svgView.replace(/</g, "&lt;") + "</pre>";
    document.body.innerHTML += "<pre id='out2'>" + svgRect.replace(/</g, "&lt;") + "</pre>";
  };
</script>
</body>
</html>
