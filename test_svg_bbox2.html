<!DOCTYPE html>
<html>
<body>
<svg id="mysvg" width="100" height="100">
  <g id="measure-wrap">
    <g transform="translate(10, 10) scale(0.5)">
      <path d="M 0 0 L 100 100" stroke="black"/>
    </g>
  </g>
</svg>
<script>
  window.onload = function() {
    var wrap = document.getElementById('measure-wrap');
    var bbox = wrap.getBBox();
    document.body.innerHTML += "<p>BBox: x=" + bbox.x + " y=" + bbox.y + " w=" + bbox.width + " h=" + bbox.height + "</p>";
  };
</script>
</body>
</html>
